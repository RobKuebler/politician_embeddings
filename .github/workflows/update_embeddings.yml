name: Update Embeddings

on:
  schedule:
    - cron: "0 4 * * *" # daily at 4am UTC
  workflow_dispatch: # allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          version: "latest"

      - name: Install dependencies
        run: uv sync --no-group dev --torch-backend cpu

      - name: Fetch data (upsert — only new polls)
        run: uv run python src/fetch_data.py

      - name: Check for data changes
        id: data_changed
        run: |
          git add data/
          git diff --staged --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT
          git restore --staged data/

      - name: Train model
        if: steps.data_changed.outputs.changed == 'true'
        run: uv run python src/train_model.py

      - name: Commit updated data and embeddings
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ outputs/
          git diff --staged --quiet || git commit -m "chore: update embeddings $(date -u +%Y-%m-%d)"
          git pull --rebase && git push
