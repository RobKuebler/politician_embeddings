name: Update Plenarprotokolle

on:
  schedule:
    - cron: "0 5 * * *" # daily at 5am UTC (after update_data)
  workflow_dispatch: # allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Fetch new Plenarprotokolle (WP21)
        run: uv run python -m src.fetch_protokolle --wahlperiode 21

      # Cache key includes the CSV of known protocol IDs — changes when new
      # protocols are fetched, causing the cache to be updated after the run.
      # restore-keys ensures existing XMLs are reused even when key changes.
      - name: Cache Plenarprotokoll XMLs and speeches (WP21)
        uses: actions/cache@v4
        with:
          path: |
            data/161/plenarprotokolle/
            data/161/speeches.csv
          key: plenarprotokolle-wp21-${{ hashFiles('data/161/dip_plenarprotokolle.csv') }}
          restore-keys: plenarprotokolle-wp21-

      - name: Download new XMLs (WP21)
        id: fetch_xml
        run: |
          output=$(uv run python -m src.fetch_protokoll_xml --wahlperiode 21 2>&1)
          echo "$output"
          if echo "$output" | grep -q "0 neue XMLs"; then
            echo "new_xmls=false" >> "$GITHUB_OUTPUT"
          else
            echo "new_xmls=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Parse speeches from XMLs (WP21)
        if: steps.fetch_xml.outputs.new_xmls == 'true'
        run: uv run python -m src.parse_protokolle --wahlperiode 21

      - name: Compute TF-IDF word stats (WP21)
        if: steps.fetch_xml.outputs.new_xmls == 'true'
        run: uv run python -m src.compute_word_stats --wahlperiode 21

      - name: Export JSON for frontend
        if: steps.fetch_xml.outputs.new_xmls == 'true'
        run: uv run python -m src.export_json

      - name: Commit and push
        if: steps.fetch_xml.outputs.new_xmls == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ frontend/public/data/
          git diff --staged --quiet || git commit -m "data: update Plenarprotokolle WP21 $(date -u +%Y-%m-%d)"
          git pull --rebase && git push
