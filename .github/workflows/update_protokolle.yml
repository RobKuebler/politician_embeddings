name: Update Plenarprotokolle

on:
  schedule:
    - cron: "0 5 * * *" # daily at 5am UTC (after update_data)
  workflow_dispatch: # allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Install spaCy German model
        run: uv run python -m spacy download de_core_news_sm

      - name: Fetch new Plenarprotokolle
        run: uv run python -m src.fetch.protokolle

      # Cache key includes the CSV of known protocol IDs — changes when new
      # protocols are fetched, causing the cache to be updated after the run.
      # restore-keys ensures existing XMLs are reused even when key changes.
      # speeches.csv is not cached — parsing all XMLs takes ~3s and is cheaper
      # than storing/restoring a 26 MB file.
      - name: Cache Plenarprotokoll XMLs
        uses: actions/cache@v4
        with:
          path: data/*/plenarprotokolle/
          key: plenarprotokolle-${{ hashFiles('data/*/dip_plenarprotokolle.csv') }}
          restore-keys: plenarprotokolle-

      - name: Download new XMLs
        id: fetch_xml
        run: uv run python -m src.fetch.protokoll_xml

      - name: Parse speeches from XMLs
        if: steps.fetch_xml.outputs.changed == 'true'
        run: uv run python -m src.parse.protokolle

      - name: Compute TF-IDF word stats
        if: steps.fetch_xml.outputs.changed == 'true'
        run: uv run python -m src.analysis.word_stats

      - name: Export JSON for frontend
        if: steps.fetch_xml.outputs.changed == 'true'
        run: uv run python -m src.export

      - name: Commit and push
        if: steps.fetch_xml.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ frontend/public/data/
          git diff --staged --quiet || git commit -m "data: update Plenarprotokolle $(date -u +%Y-%m-%d)"
          git pull --rebase && git push
