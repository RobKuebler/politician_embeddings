name: Update data

on:
  schedule:
    - cron: "0 4 * * *" # daily at 4am UTC
  workflow_dispatch: # allow manual trigger

concurrency:
  group: data-pipeline-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      DIP_API_KEY: ${{ secrets.DIP_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          version: "latest"

      - name: Install dependencies
        run: uv sync --frozen --group train

      - name: Cache plenary protocol XMLs
        uses: actions/cache@v4
        with:
          path: data/*/plenary_protocols/
          key: plenary-protocols-${{ github.run_id }}
          restore-keys: plenary-protocols-

      - name: Fetch Abgeordnetenwatch data
        id: fetch_aw
        run: uv run python -m src.fetch.abgeordnetenwatch

      - name: Download new plenary protocol XMLs
        id: fetch_xml
        run: uv run python -m src.fetch.protocol_xml

      - name: Compute TF-IDF word stats
        if: steps.fetch_xml.outputs.changed == 'true'
        run: uv run python -m src.analysis.word_stats

      - name: Train model
        if: steps.fetch_aw.outputs.model_inputs_changed == 'true'
        run: uv run python -m src.model.train

      - name: Export JSON for frontend
        run: uv run python -m src.export

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ outputs/ frontend/public/data/
          git diff --staged --quiet || git commit -m "data: aktualisiere Daten $(date -u +%Y-%m-%d)"
          git pull --rebase && git push
