name: Update data

on:
  schedule:
    - cron: "0 4 * * *" # daily at 4am UTC
  workflow_dispatch: # allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          version: "latest"

      - name: Install dependencies
        run: uv sync --group train

      - name: Fetch data
        id: fetch
        run: |
          output=$(uv run python -m src.fetch_data 2>&1)
          echo "$output"
          if echo "$output" | grep -q "nothing to fetch"; then
            echo "new_data=false" >> "$GITHUB_OUTPUT"
          else
            echo "new_data=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Train model
        if: steps.fetch.outputs.new_data == 'true'
        run: uv run python -m src.train_model

      - name: Export JSON for frontend
        run: uv run python -m src.export_json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ outputs/ frontend/public/data/
          git diff --staged --quiet || git commit -m "data: aktualisiere Daten $(date -u +%Y-%m-%d)"
          git pull --rebase && git push
