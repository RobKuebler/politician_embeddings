name: Update Plenarprotokolle

on:
  schedule:
    - cron: "0 5 * * *" # daily at 5am UTC (after update_data)
  workflow_dispatch: # allow manual trigger

concurrency:
  group: data-pipeline-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      DIP_API_KEY: ${{ secrets.DIP_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          version: "latest"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Install spaCy German model
        run: uv run python -m spacy download de_core_news_sm

      - name: Fetch new plenary protocols
        id: fetch_protocols
        run: uv run python -m src.fetch.protocols

      # Cache key includes the CSV of known protocol IDs — changes when new
      # protocols are fetched, causing the cache to be updated after the run.
      # restore-keys ensures existing XMLs are reused even when key changes.
      # speeches.csv is not cached — parsing all XMLs takes ~3s and is cheaper
      # than storing/restoring a 26 MB file.
      - name: Cache plenary protocol XMLs
        uses: actions/cache@v4
        with:
          path: data/*/plenary_protocols/
          key: plenary-protocols-${{ hashFiles('data/*/dip_plenary_protocols.csv') }}
          restore-keys: plenary-protocols-

      - name: Download new XMLs
        id: fetch_xml
        run: uv run python -m src.fetch.protocol_xml

      - name: Parse speeches from XMLs
        run: uv run python -m src.parse.protocols

      - name: Compute TF-IDF word stats
        run: uv run python -m src.analysis.word_stats

      - name: Export JSON for frontend
        run: uv run python -m src.export

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ frontend/public/data/
          git diff --staged --quiet || git commit -m "data: update Plenarprotokolle $(date -u +%Y-%m-%d)"
          git pull --rebase && git push
