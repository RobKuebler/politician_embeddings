name: Update Plenarprotokolle

on:
  schedule:
    - cron: "0 5 * * *" # daily at 5am UTC (after update_data)
  workflow_dispatch: # allow manual trigger

concurrency:
  group: data-pipeline-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      DIP_API_KEY: ${{ secrets.DIP_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          version: "latest"

      - name: Install dependencies
        run: uv sync --frozen

      # restore-keys ensures existing XMLs are reused across runs.
      # A new cache entry is saved after each run (keyed by run_id) so the
      # next run always starts with the full set of previously downloaded XMLs.
      - name: Cache plenary protocol XMLs
        uses: actions/cache@v4
        with:
          path: data/*/plenary_protocols/
          key: plenary-protocols-${{ github.run_id }}
          restore-keys: plenary-protocols-

      - name: Download new XMLs
        id: fetch_xml
        run: uv run python -m src.fetch.protocol_xml

      - name: Compute TF-IDF word stats
        run: uv run python -m src.analysis.word_stats

      - name: Export JSON for frontend
        run: uv run python -m src.export

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ frontend/public/data/
          git diff --staged --quiet || git commit -m "data: update Plenarprotokolle $(date -u +%Y-%m-%d)"
          git pull --rebase && git push
